<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Proposta</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <div class="card">
        <h1>Olá, Ana Caroline da Silva Lira!</h1>
        <h3>
          Eu tenho certeza de que você é a pessoa mais incrível que eu já
          conheci.
        </h3>
        <h3></h3>
        <p class="question">
          Eu nunca fiz essa a proposta ainda, mas eu quero saber se queres ser a
          minha
          <strong>(SABOR)</strong> namorada até sermos oficialmente namorados?
        </p>
        <div class="buttons">
          <button id="yesButton" class="btn yes">Sim</button>
          <button id="noButton" class="btn no">Não</button>
        </div>
        <img
          src="./image.jpeg"
          alt="Special Image"
          class="hidden"
          style="max-width: 100%; margin: 20px 0"
        />
        <p id="response" class="response hidden"></p>
      </div>
    </main>
    <script src="script.js"></script>
  </body>
</html>
